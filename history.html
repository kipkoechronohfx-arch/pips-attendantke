<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal History | Pips_attendant</title>
  <meta name="description" content="View historical trading signals and performance results from Pips_attendant.">
  <link rel="icon" type="image/png" href="avatar.png">
  
  <meta name="theme-color" content="#0d0800">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'neon-blue': '#f59e0b',
            'neon-purple': '#d97706',
            'dark-navy': '#0d0800',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background-color: #0d0800; font-family: 'Inter', sans-serif; }
    .glass-card {
      backdrop-filter: blur(16px);
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.08);
      box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
    }
  </style>
</head>
<body class="text-white min-h-screen relative overflow-x-hidden selection:bg-amber-400/20">

  <!-- Dubai Golden Background Image -->
  <div class="fixed inset-0 z-0 pointer-events-none" style="
    background-image: url('dubai_bg.png');
    background-size: cover;
    background-position: center bottom;
    background-repeat: no-repeat;
    opacity: 0.38;
  "></div>

  <!-- Dark golden base overlay -->
  <div class="fixed inset-0 z-0 pointer-events-none" style="background: linear-gradient(180deg, rgba(13,8,0,0.82) 0%, rgba(13,8,0,0.5) 40%, rgba(13,8,0,0.45) 70%, rgba(13,8,0,0.9) 100%);"></div>

  <!-- Background Glow -->
  <div class="fixed inset-0 z-0 pointer-events-none opacity-70">
    <div class="absolute top-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full mix-blend-screen animate-pulse" style="background: radial-gradient(circle, rgba(245,158,11,0.28) 0%, transparent 70%); filter: blur(120px);"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[55%] h-[50%] rounded-full mix-blend-screen animate-pulse" style="background: radial-gradient(circle, rgba(217,119,6,0.22) 0%, transparent 70%); filter: blur(100px); animation-delay: 1.5s"></div>
  </div>

  <main class="container mx-auto px-4 py-12 max-w-3xl relative z-10">
    
    <!-- Header Nav -->
    <div class="mb-8 flex justify-between items-center">
      <a href="index.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-amber-400 transition text-sm font-medium">
        <i data-feather="arrow-left" class="w-4 h-4"></i>
        Back to Home
      </a>
      <button onclick="toggleTheme()" class="flex items-center justify-center w-8 h-8 rounded-full bg-white/5 border border-white/10 hover:border-amber-400/50 hover:bg-amber-400/10 hover:text-amber-400 text-gray-400 transition duration-300 cursor-pointer" title="Toggle Theme">
        <i id="themeIcon" data-feather="sun" class="w-4 h-4"></i>
      </button>
    </div>

    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-tr from-amber-500 to-yellow-300 text-4xl mb-5 shadow-[0_0_30px_rgba(251,191,36,0.3)]">📜</div>
      <h1 class="text-4xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-amber-400 via-yellow-300 to-amber-400 mb-3">Signal History</h1>
      <p class="text-gray-400 text-sm max-w-md mx-auto">Review our past performance and setups. Total transparency on every trade we take.</p>
    </div>

    <!-- Signal List -->
    <div id="historyContainer" class="space-y-4">
      <div class="text-center py-10 text-gray-500">
        <i data-feather="loader" class="w-8 h-8 mx-auto animate-spin mb-4 text-amber-500/50"></i>
        <p>Loading historical signals...</p>
      </div>
    </div>

  </main>

  <script>
    feather.replace();

    // --- THEME TOGGLE ---
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark-navy') {
        document.body.classList.add('dark-navy-mode');
        const icon = document.getElementById('themeIcon');
        if (icon) icon.setAttribute('data-feather', 'moon');
      }
    }

    function toggleTheme() {
      const isDarkNavy = document.body.classList.toggle('dark-navy-mode');
      localStorage.setItem('theme', isDarkNavy ? 'dark-navy' : 'gold');
      const icon = document.getElementById('themeIcon');
      if (icon) {
        icon.setAttribute('data-feather', isDarkNavy ? 'moon' : 'sun');
        feather.replace();
      }
    }

    async function loadHistory() {
      const container = document.getElementById('historyContainer');
      try {
        // Fetch both signals and logged trade results in parallel
        const [sigRes, perfRes] = await Promise.all([
          fetch('/api/signals/history').then(r => r.json()).catch(() => ({ ok: false, signals: [] })),
          fetch('/api/performance/all').then(r => r.json()).catch(() => ({ ok: false, logs: [] }))
        ]);

        const signals = (sigRes.ok && sigRes.signals) ? sigRes.signals : [];
        const perfLogs = (perfRes.ok && perfRes.logs) ? perfRes.logs : [];

        // Build unified list
        const items = [];

        // Add broadcast signals
        signals.forEach(s => {
          items.push({
            _kind: 'signal',
            timestamp: s.sentAt ? new Date(s.sentAt).getTime() : (s.id || 0),
            text: s.text || '',
            type: s.type || 'signal',
            pair: extractPair(s.text),
            entry: extractField(s.text, 'Entry'),
            tp: extractField(s.text, 'TP') || extractField(s.text, 'Take Profit'),
            sl: extractField(s.text, 'SL') || extractField(s.text, 'Stop Loss'),
          });
        });

        // Add performance (win/loss) logs
        perfLogs.forEach(log => {
          items.push({
            _kind: 'trade',
            timestamp: log.date ? new Date(log.date).getTime() : 0,
            pair: log.asset || 'XAUUSD',
            type: log.type || '',
            result: log.result || '',
            pips: log.pips || 0,
          });
        });

        // Sort newest first
        items.sort((a, b) => b.timestamp - a.timestamp);

        if (items.length === 0) {
          container.innerHTML = `
            <div class="glass-card border border-amber-400/20 rounded-2xl p-10 text-center text-gray-500">
              <i data-feather="inbox" class="w-10 h-10 mx-auto mb-3 opacity-50"></i>
              <p class="font-semibold mb-1">No history yet.</p>
              <p class="text-xs">Past signals and trade results will appear here once posted.</p>
            </div>
          `;
          feather.replace();
          return;
        }

        container.innerHTML = '';

        items.forEach(item => {
          const date = new Date(item.timestamp).toLocaleString([], {
            weekday: 'short', month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });

          if (item._kind === 'trade') {
            // WIN / LOSS card
            const isWin = item.result === 'Win';
            const statusColor = isWin
              ? 'text-emerald-400 bg-emerald-500/10 border-emerald-400/30'
              : 'text-rose-400 bg-rose-500/10 border-rose-400/30';
            const pipsColor = isWin ? 'text-emerald-400' : 'text-rose-400';
            const pipsSign  = isWin ? '+' : '-';
            const icon      = isWin ? '✅' : '❌';

            container.innerHTML += `
              <div class="glass-card border border-amber-400/10 rounded-2xl p-5 flex flex-col md:flex-row md:items-center justify-between gap-4 hover:border-amber-400/30 transition">
                <div class="flex items-start gap-4">
                  <div class="text-2xl mt-0.5">${icon}</div>
                  <div>
                    <div class="flex items-center gap-3 mb-1 flex-wrap">
                      <span class="text-white font-bold text-lg">${item.pair}</span>
                      ${item.type ? `<span class="text-[10px] text-gray-400 bg-white/5 border border-white/10 px-2 py-0.5 rounded uppercase">${item.type}</span>` : ''}
                      <span class="px-2.5 py-1 text-[10px] font-bold rounded uppercase border ${statusColor}">${item.result}</span>
                    </div>
                    <p class="${pipsColor} font-bold text-lg">${pipsSign}${Math.abs(item.pips)} Pips</p>
                  </div>
                </div>
                <div class="text-right">
                  <span class="text-gray-500 text-xs">${date}</span>
                </div>
              </div>
            `;
          } else {
            // SIGNAL broadcast card
            const previewText = item.text
              ? item.text.replace(/\*/g, '').replace(/_/g, '').substring(0, 120) + (item.text.length > 120 ? '…' : '')
              : 'Signal broadcast';

            container.innerHTML += `
              <div class="glass-card border border-amber-400/10 rounded-2xl p-5 flex flex-col md:flex-row md:items-start justify-between gap-4 hover:border-amber-400/30 transition">
                <div class="flex items-start gap-4 flex-1 min-w-0">
                  <div class="text-2xl mt-0.5">📡</div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-3 mb-2 flex-wrap">
                      <span class="text-white font-bold text-base">${item.pair || 'Signal'}</span>
                      <span class="px-2.5 py-1 text-[10px] font-bold rounded uppercase border text-cyan-400 bg-cyan-500/10 border-cyan-400/20">BROADCAST</span>
                    </div>
                    ${(item.entry || item.tp || item.sl) ? `
                    <p class="text-gray-400 text-sm font-mono bg-black/30 px-3 py-1.5 rounded-lg inline-block border border-white/5 mb-2">
                      ${item.entry ? `Entry: ${item.entry}` : ''} ${item.tp ? `| TP: ${item.tp}` : ''} ${item.sl ? `| SL: ${item.sl}` : ''}
                    </p>` : ''}
                    <p class="text-gray-500 text-xs leading-relaxed truncate">${previewText}</p>
                  </div>
                </div>
                <div class="text-right flex-shrink-0">
                  <span class="text-gray-500 text-xs">${date}</span>
                </div>
              </div>
            `;
          }
        });

        feather.replace();
      } catch (err) {
        container.innerHTML = '<p class="text-center text-rose-400 py-10">Error loading history. Please try again.</p>';
      }
    }

    // Helper: extract currency pair from signal text
    function extractPair(text) {
      if (!text) return 'SIGNAL';
      const match = text.match(/\b(XAUUSD|EURUSD|GBPUSD|USDJPY|USDCHF|AUDUSD|NZDUSD|USDCAD|GBPJPY|EURJPY|BTCUSD|US30|NAS100|[A-Z]{6})\b/i);
      return match ? match[1].toUpperCase() : 'SIGNAL';
    }

    // Helper: extract a labelled field value from signal text
    function extractField(text, label) {
      if (!text) return null;
      const regex = new RegExp(`${label}[:\\s]+([\\d.]+)`, 'i');
      const match = text.match(regex);
      return match ? match[1] : null;
    }

    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      loadHistory();
    });
  </script>

  <!-- Pips Assistant AI Support Widget -->
  <script src="/chat-widget.js"></script>
</body>
</html>
